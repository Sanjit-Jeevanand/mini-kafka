services:
  broker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "9092:9092"
    volumes:
      - broker-data:/data
    command:
      - -addr=:9092
      - -dir=/data
      - -topic=default
      - -partitions=4
      - -max-conns=1024

  web:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../web:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  broker-data:
  caddy-data:
  caddy-config:
